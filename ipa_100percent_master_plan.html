
<style>
*{box-sizing:border-box;margin:0;padding:0}
.wrap{padding:.75rem 0;font-family:var(--font-sans)}
.hdr{background:var(--color-background-secondary);border-radius:var(--border-radius-lg);padding:.875rem 1.25rem;margin-bottom:.875rem}
.stats{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:.75rem}
.stat{flex:1;min-width:58px;text-align:center}
.sn{font-size:17px;font-weight:500;color:var(--color-text-primary)}
.sl{font-size:10px;color:var(--color-text-secondary);margin-top:1px}
.gbar{display:flex;align-items:center;gap:8px}
.gl{font-size:11px;color:var(--color-text-secondary);white-space:nowrap}
.gbg{flex:1;height:6px;background:var(--color-border-tertiary);border-radius:20px}
.gfill{height:6px;border-radius:20px;background:linear-gradient(90deg,#1D9E75,#3B8BD4,#534AB7)}
.legend{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px}
.leg{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--color-text-secondary)}
.ldot{width:8px;height:8px;border-radius:2px;flex-shrink:0}

.ptabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:.75rem}
.pt{padding:4px 11px;border-radius:14px;font-size:12px;cursor:pointer;border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-secondary);transition:all .15s}
.pt.on{background:var(--color-background-info);color:var(--color-text-info);border-color:transparent;font-weight:500}
.pt.et{border-color:var(--color-border-danger);color:var(--color-text-danger)}
.pt.et.on{background:var(--color-background-danger)}

.dchips{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:.875rem}
.dc{padding:5px 9px;border-radius:9px;font-size:11px;cursor:pointer;border:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);color:var(--color-text-secondary);text-align:center;transition:all .15s;min-width:62px}
.dc:hover{border-color:var(--color-border-secondary);background:var(--color-background-secondary)}
.dc.on{border-color:var(--color-border-info);background:var(--color-background-info);color:var(--color-text-info);font-weight:500}
.dc.edc{border-color:var(--color-border-danger)!important;background:var(--color-background-danger)!important;color:var(--color-text-danger)!important}
.dcd{font-size:10px;font-weight:500;display:block}
.dcn{font-size:9px;display:block;margin-top:1px;opacity:.75}

.dp{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden}
.dph{padding:10px 14px;background:var(--color-background-secondary);border-bottom:0.5px solid var(--color-border-tertiary)}
.dpt{font-size:13px;font-weight:500;color:var(--color-text-primary)}
.dps{font-size:11px;color:var(--color-text-secondary);margin-top:2px}
.dpb{padding:10px 14px}

.slot{border-radius:var(--border-radius-md);margin-bottom:7px;overflow:hidden}
.sh{display:flex;align-items:flex-start;gap:8px;padding:7px 10px}
.st{font-size:10px;font-weight:500;white-space:nowrap;margin-top:1px}
.stag{font-size:10px;font-weight:500;padding:2px 7px;border-radius:8px;white-space:nowrap;flex-shrink:0}
.sw{font-size:12px;font-weight:500;flex:1}
.sb{padding:2px 10px 8px;font-size:11px;line-height:1.55;color:var(--color-text-secondary)}

.sw{background:var(--color-background-info)}.sw .st,.sw .sw2{color:var(--color-text-info)}.sw .stag{background:#185FA5;color:#fff}
.sc{background:var(--color-background-success)}.sc .st,.sc .sw2{color:var(--color-text-success)}.sc .stag{background:#3B6D11;color:#fff}
.sg{background:var(--color-background-warning)}.sg .st,.sg .sw2{color:var(--color-text-warning)}.sg .stag{background:#854F0B;color:#fff}
.sp{background:var(--color-background-secondary)}.sp .st{color:var(--color-text-secondary)}.sp .sw2{color:var(--color-text-primary)}.sp .stag{background:#534AB7;color:#fff}

.tip{border-left:3px solid var(--color-border-info);padding:7px 10px;background:var(--color-background-info);border-radius:0 var(--border-radius-md) var(--border-radius-md) 0;font-size:11px;color:var(--color-text-info);line-height:1.5;margin-top:8px}
.wrn{border-left:3px solid var(--color-border-danger);padding:7px 10px;background:var(--color-background-danger);border-radius:0 var(--border-radius-md) var(--border-radius-md) 0;font-size:11px;color:var(--color-text-danger);line-height:1.5;margin-top:8px}
.suc{border-left:3px solid var(--color-border-success);padding:7px 10px;background:var(--color-background-success);border-radius:0 var(--border-radius-md) var(--border-radius-md) 0;font-size:11px;color:var(--color-text-success);line-height:1.5;margin-top:8px}
</style>

<script>
const W='sw',C='sc',G='sg',P='sp';
const TAGS={sw:'WATCH 📺',sc:'CODE ⌨️',sg:'GFG 🟢',sp:'PRACTICE 💡'};

const days=[
{n:1,date:'Mar 22',dw:'Sun',ph:1,topic:'Setup + Hello World + Java Syntax',
slots:[
[W,'7:00–7:30','YouTube: search "Apna College Java Tutorial 1 Introduction"','Watch the full intro video. Note down: what is class, public static void main(String[] args), System.out.println(), why semicolons matter. Goal: understand the structure of a Java program.'],
[C,'7:30–8:00','Open w3schools.com/java → Java Tutorial → Syntax','Type EVERY example by hand — never copy-paste. Run each one in VS Code or IntelliJ. Fix errors yourself. Install JDK if not done. This builds muscle memory.'],
[G,'8:00–8:30','GFG: search "Introduction to Java" → read the article','Key IPA MCQ: JVM (runs bytecode) vs JRE (JVM + libraries) vs JDK (JRE + compiler). Memorize this hierarchy — it is asked directly in IPA!'],
[P,'8:30–9:00','Ask me here: give me Day 1 Practice Problems','Write these 3 programs: 1) Print your full name. 2) Print numbers 1–10 (one per line). 3) Print "I will crack IPA 100%" 5 times. Run all three.']
],tip:'Goal today: get Java running and print something. If your Hello World works, today is a success. Setup takes time — be patient!'},

{n:2,date:'Mar 23',dw:'Mon',ph:1,topic:'Data Types + Variables + Scanner Input',
slots:[
[W,'7:00–7:30','YouTube: search "Apna College Java Variables Data Types"','Learn: int, double, float, char, boolean, String. Declaration vs initialization. Type casting: (int)9.99 → 9. Range of int (-2 billion to +2 billion).'],
[C,'7:30–8:00','w3schools.com/java/java_data_types.asp + java_type_casting.asp','Type all examples. CRITICAL: learn Scanner now — Scanner sc = new Scanner(System.in); int n = sc.nextInt(); String s = sc.next(); — EVERY IPA coding question uses this for reading input!'],
[G,'8:00–8:30','GFG: Quiz Corner → Java → "Java Data Types Quiz" → do all questions','MCQ traps: int overflow wraps around, float vs double precision, char stores ASCII value. What is default value of int? (0). These are IPA MCQ questions!'],
[P,'8:30–9:00','Ask me here: Day 2 Practice Problems','I give you: 1) Read 2 numbers, print sum and product. 2) Read name + age, print greeting. 3) Read radius, print area of circle (pi=3.14). Test Scanner input for all three.']
],tip:'Scanner is used in EVERY IPA coding question to read input. Memorize: sc.nextInt(), sc.nextDouble(), sc.next(), sc.nextLine(). This is non-negotiable!'},

{n:3,date:'Mar 24',dw:'Tue',ph:1,topic:'Operators + Modulo + Type Casting Traps',
slots:[
[W,'7:00–7:30','YouTube: search "Apna College Java Operators tutorial"','Learn: arithmetic (+,-,*,/,%), relational (==,!=,>,<,>=,<=), logical (&&,||,!), assignment (+=,-=,*=), ternary (?:), pre vs post increment (++i vs i++).'],
[C,'7:30–8:00','w3schools.com/java/java_operators.asp','Practice CRITICAL traps: 5/2 = 2 (integer division!), 5.0/2 = 2.5. 10%3 = 1. ++i vs i++ output difference. Type (int)(3.9+0.2) = ? These EXACT questions appear in IPA MCQs!'],
[G,'8:00–8:30','GFG: "Java Operators Quiz" → all questions + "Java Type Conversion Quiz"','Key MCQs: operator precedence (* before +), what does i++ return (original i), what is 1/0 vs 1.0/0, char+int arithmetic. MCQ goldmine!'],
[P,'8:30–9:00','Ask me here: Day 3 Practice Problems','I give you: 1) Calculator (all 4 ops). 2) Check divisible by 3 AND 5. 3) Extract last 2 digits of any number using %. 4) Temperature C→F converter.']
],tip:'% (modulo) is in almost every IPA easy coding question — reverse digits, check divisibility, extract last digit. Master it: last digit of N = N%10, remove last digit = N/10.'},

{n:4,date:'Mar 25',dw:'Wed',ph:1,topic:'Conditionals — if / else if / else / switch',
slots:[
[W,'7:00–7:30','YouTube: search "Apna College Java if else switch case tutorial"','Learn: if, else if, else, nested if, switch-case, break in switch. When to use switch vs if-else. Understand fall-through in switch.'],
[C,'7:30–8:00','w3schools.com/java/java_conditions.asp + java_switch.asp','Write grade calculator using if-else (A/B/C/D/F). Then rewrite using switch. Compare both approaches. Also: write nested if for quadrant of a coordinate point.'],
[G,'8:00–8:30','GFG: Quiz Corner → "Java Control Flow Quiz" → ALL questions','TRAP: switch without break → fall-through executes all following cases! This specific scenario appears in IPA MCQ. Know exactly what prints when break is missing.'],
[P,'8:30–9:00','Ask me here: Day 4 Practice Problems','I give you: 1) Positive/negative/zero checker. 2) Max of 3 numbers without Math.max. 3) Grade calculator. 4) Leap year check (divisible by 4 but not 100, or divisible by 400).']
],tip:'Switch fall-through (missing break) is a guaranteed IPA MCQ trap. Learn it: without break, execution falls to the next case automatically — every case below runs!'},

{n:5,date:'Mar 26',dw:'Thu',ph:1,topic:'Loops — for / while / do-while / break / continue',
slots:[
[W,'7:00–7:30','YouTube: search "Apna College Java Loops for while do-while"','Learn: for loop (init;condition;update), while loop, do-while (runs at least once), break (exit loop), continue (skip this iteration), nested loops.'],
[C,'7:30–8:00','w3schools.com/java/java_for_loop.asp + java_while_loop.asp','Write: same program (print 1–10) using all 3 loop types. Nested loop: print 5×5 star pattern. Know: do-while always runs once even if condition false — MCQ trap!'],
[G,'8:00–8:30','GFG: "Java Loops Quiz" → ALL questions','Key MCQ: how many times does for(int i=1;i<5;i++) run? (4 times). Does do-while run if condition is false? (Yes — once). What does break inside inner loop do? (exits inner loop only).'],
[P,'8:30–9:00','Ask me here: Day 5 Practice Problems','I give you: 1) Sum of digits of N (1234→10). 2) Factorial. 3) Fibonacci up to N. 4) Print primes up to 50. 5) REVERSE a number — this is the most common IPA easy coding question!']
],tip:'Reverse a number algorithm: while(n>0){digit=n%10; reversed=reversed*10+digit; n=n/10;}. Memorize this! It is in almost every IPA easy coding section.'},

{n:6,date:'Mar 27',dw:'Fri',ph:1,topic:'Arrays — 1D + Traversal + Sorting + IPA Pattern',
slots:[
[W,'7:00–7:30','YouTube: search "Apna College Java Arrays 1D tutorial"','Learn: declare (int[] arr = new int[5]), initialize ({1,2,3,4,5}), access (arr[0]..arr[4]), traverse with for loop, arr.length (no parentheses!), enhanced for loop.'],
[C,'7:30–8:00','w3schools.com/java/java_arrays.asp + java_arrays_sort.asp','Write: 1) Read 5 nums into array using Scanner loop. 2) Print all. 3) Find max and min. 4) Arrays.sort(arr). 5) Reverse an array. 6) Find sum and average.'],
[G,'8:00–8:30','GFG: "Java Array Quiz" → ALL questions','MCQs: default value of int array? (0). String array? (null). arr.length vs String.length()? Accessing arr[5] when size=5? (ArrayIndexOutOfBoundsException). All IPA material!'],
[P,'8:30–9:00','Ask me here: Day 6 — IPA Easy Q Pattern','I give you the EXACT IPA easy question: Read 5 integers and 2 limit values. Print average of numbers greater than limit1 and less than limit2. This is a real previous year IPA easy question!']
],tip:'IPA easy question pattern with arrays: read array → apply filter condition → compute something (sum/average/count) → print result. Master this loop+condition+array pattern today!'},

{n:7,date:'Mar 28',dw:'Sat',ph:1,topic:'Strings — ALL Methods (Most Tested in IPA!)',
slots:[
[W,'7:00–7:30','YouTube: search "Apna College Java String methods complete"','Learn every method: length(), charAt(i), substring(s,e), indexOf(c), toUpperCase(), toLowerCase(), equals(), equalsIgnoreCase(), contains(), replace(), split(), trim(), valueOf().'],
[C,'7:30–8:00','w3schools.com/java/java_strings.asp + java_ref_string.asp','Type every method with examples. CRITICAL: String is immutable! s.toUpperCase() does NOT change s — you must do s = s.toUpperCase(). Also: StringBuilder for efficient reversal.'],
[G,'8:00–8:30','GFG: "Java String Quiz" → ALL string quizzes (there are multiple!)','#1 IPA MCQ TRAP: == compares references, .equals() compares content. String s1="hi"; String s2=new String("hi"); s1==s2 is FALSE. s1.equals(s2) is TRUE. Memorize this!'],
[P,'8:30–9:00','Ask me here: Day 7 Practice Problems — all are real IPA questions!','I give you: 1) Palindrome checker. 2) Count vowels and consonants. 3) Reverse a string. 4) Count occurrences of a character. 5) Check if two strings are anagrams. ALL are real IPA easy coding patterns!']
],tip:'== vs .equals() for Strings is the #1 most tested Java MCQ in IPA history. Answer always: use .equals() to compare content. == compares memory addresses, not values!'},

// Phase 2: OOP
{n:8,date:'Mar 29',dw:'Sun',ph:2,topic:'Classes + Objects + Methods (OOP Begins!)',
slots:[
[W,'7:00–7:30','YouTube: search "Apna College Java OOP Classes Objects tutorial"','Learn: class = blueprint, object = instance. Class has: attributes (fields) + behaviors (methods). new keyword creates object on heap. Reference variable holds the address.'],
[C,'7:30–8:00','w3schools.com/java/java_classes.asp + java_class_methods.asp','Write Car class: String color; String brand; int speed; void drive(){System.out.println(brand+" driving at "+speed);} Create 3 Car objects with different values. Call drive() on each.'],
[G,'8:00–8:30','GFG: "Java Classes and Objects Quiz" + "Java OOP Basics Quiz"','MCQ keys: where are objects stored? (heap). Where are primitive variables stored? (stack). What is null? (reference pointing to nothing). Default value of object reference? (null).'],
[P,'8:30–9:00','Ask me here: Day 8 Practice Problems','I give you: 1) Rectangle class (length, width, getArea(), getPerimeter()). 2) BankAccount (balance, deposit(), withdraw(), getBalance()). Create 3 objects of each, test all methods.']
],tip:'OOP is the heart of IPA. The 35-mark coding question = build a class + add methods. Everything in Week 2 builds toward that one question. Start taking it seriously today.'},

{n:9,date:'Mar 30',dw:'Mon',ph:2,topic:'Constructors + Getters + Setters — THE IPA Pattern!',
slots:[
[W,'7:00–7:30','YouTube: search "Apna College Java Constructors getters setters encapsulation"','Learn: default constructor (Java creates automatically), parameterized constructor (you create). WHY private fields: prevents invalid data. Getter = read field. Setter = modify field.'],
[C,'7:30–8:00','w3schools.com/java/java_constructors.asp + java_encapsulation.asp','Write EXACT IPA pattern: class Student{private int rollNo; private String name; private double marks; public Student(int r,String n,double m){rollNo=r;name=n;marks=m;} + ALL getters (getRollNo etc.) + ALL setters (setRollNo etc.)}. This IS the IPA hard question structure!'],
[G,'8:00–8:30','GFG: "Java Constructor Quiz" → all questions','MCQ traps: Can constructor have return type? (No — even void makes it a method, not constructor). Can constructor be called directly? (No — only via new). What is constructor chaining? this() keyword.'],
[P,'8:30–9:00','Ask me here: Build Employee class in IPA format','I give you the spec: private empId(int), empName(String), salary(double), department(String). Parameterized constructor + all 8 getters/setters + printDetails() method. This is literally an IPA hard question!']
],tip:'MEMORIZE this pattern cold: private fields + parameterized constructor + getters + setters. Write it from memory in under 5 min. This skeleton alone = 20 of the 35 hard coding marks!'},

{n:10,date:'Mar 31',dw:'Tue',ph:2,topic:'Encapsulation + Access Modifiers (private/public/protected)',
slots:[
[W,'7:00–7:30','YouTube: search "Apna College Java Encapsulation Access Modifiers"','Learn all 4: public (accessible everywhere), private (same class only), protected (same package + subclasses), default (same package only). Which is most restrictive? (private).'],
[C,'7:30–8:00','w3schools.com/java/java_modifiers.asp','Write 2 versions: 1) All public fields — show how they can be directly modified to invalid values. 2) Private fields + getters/setters — show how setter can validate (e.g. if salary<0 don\'t set it). See why private is always better!'],
[G,'8:00–8:30','GFG: "Java Access Modifiers Quiz" + "Java Encapsulation Quiz" → 20+ MCQs','Key MCQs: Can private method be overridden? (No). Can subclass access private fields of parent? (No — only through public getters). What access modifier has no keyword? (default/package-private).'],
[P,'8:30–9:00','Ask me here: Day 10 — Complete Product class','Build: class Product with private productId(int), productName(String), price(double), category(String). Constructor + all getters/setters. Add validation: setPrice() rejects values ≤ 0. printDetails() method.']
],tip:'IPA rule: ALL fields in your coding solution MUST be private. If any field is public, you risk losing marks. Always private + public getter + public setter. No exceptions!'},

{n:11,date:'Apr 1',dw:'Wed',ph:2,topic:'Inheritance + extends + super keyword',
slots:[
[W,'7:00–7:30','YouTube: search "Apna College Java Inheritance extends super"','Learn: extends keyword, parent class (superclass), child class (subclass). Child inherits all public/protected members. Method overriding with @Override. super() calls parent constructor. super.method() calls parent method.'],
[C,'7:30–8:00','w3schools.com/java/java_inheritance.asp','Write: Animal(name, makeSound()). Dog extends Animal — override makeSound() to print "Woof!". Cat extends Animal — "Meow!". Use super(name) in Dog and Cat constructors. Create objects and call makeSound() on each.'],
[G,'8:00–8:30','GFG: "Java Inheritance Quiz" → ALL questions','MAJOR MCQ: Multiple inheritance with classes? (NO in Java!). Multiple interfaces? (YES). Order of constructors: parent constructor runs FIRST, then child. What if parent has no default constructor? (must call super() explicitly). All IPA material!'],
[P,'8:30–9:00','Ask me here: Day 11 Practice Problems','Build: Shape(color) → Circle(radius, getArea()) and Rectangle(length, width, getArea()). Use super(color) in both. Main: create array of Shape, call getArea() on each (polymorphism preview).']
],tip:'Java has NO multiple inheritance with classes — "class C extends A,B" is a COMPILE ERROR. But "class C implements A,B" (multiple interfaces) is fine. This is one of the most asked IPA MCQs!'},

{n:12,date:'Apr 2',dw:'Thu',ph:2,topic:'Polymorphism + Abstract Class + Interface',
slots:[
[W,'7:00–7:30','YouTube: search "Apna College Java Polymorphism Abstract Interface"','Overloading (same class, different params = compile-time). Overriding (parent+child, same signature = runtime). Abstract class (has abstract methods, cannot create object). Interface (all abstract by default, use implements, multiple allowed).'],
[C,'7:30–8:00','w3schools.com/java/java_abstract.asp + java_interface.asp + java_polymorphism.asp','Write: abstract class Vehicle{abstract void fuelType();}. Car and Bike extend it. Interface Flyable{void fly();}. Plane implements Flyable. See how both work differently.'],
[G,'8:00–8:30','GFG: "Java Polymorphism Quiz" + "Java Interface Quiz" → 30 MCQs TOTAL','MUST KNOW IPA MCQs: Can you instantiate abstract class? (NO). Interface constructor? (NO). Interface variables are? (public static final). Can interface have default methods? (YES in Java 8+). Memorize all!'],
[P,'8:30–9:00','Ask me here: 10 IPA-style OOP output MCQs','Ask me to give you 10 tricky output-based OOP MCQs. For each: trace the code on PAPER first, predict output, THEN check. This is how you build the MCQ skill for the real exam.']
],tip:'Output-based OOP MCQs are the hardest part of IPA MCQ section. The skill: trace code on paper line by line. Never guess. Practice this tonight — it alone gains you 5-8 marks!'},

{n:13,date:'Apr 3',dw:'Fri',ph:2,topic:'ArrayList + Comparator + Sorting Objects (IPA Hard Q!)',
slots:[
[W,'7:00–7:30','YouTube: search "Apna College Java ArrayList Collections sort Comparator"','Learn: ArrayList<Type> list = new ArrayList<>(); add(), remove(), get(), size(), contains(). Collections.sort() for primitives. Comparator interface for sorting custom objects by any field.'],
[C,'7:30–8:00','w3schools.com/java/java_arraylist.asp','Write: ArrayList of 5 Student objects. Sort by marks ascending: Collections.sort(list,(a,b)->Double.compare(a.getMarks(),b.getMarks())). Descending: (a,b)->Double.compare(b.getMarks(),a.getMarks()). Filter: loop + if condition.'],
[G,'8:00–8:30','GFG: "Java Collections Quiz" → all questions','Key MCQs: ArrayList vs Array (ArrayList dynamic, resizable). ArrayList vs LinkedList (ArrayList faster random access). Collections.sort uses which sort internally? How does Comparator work?'],
[P,'8:30–9:00','Ask me here: IPA Hard Q pattern with Player class','Build: ArrayList of 5 Player objects. Methods: 1) sort by runs ascending. 2) sort descending. 3) find player with lowest runs. 4) filter players by matchType and return list. This IS the previous year IPA question!']
],tip:'Sorting with lambda Comparator: (a,b)->a.getRuns()-b.getRuns() for ascending. (a,b)->b.getRuns()-a.getRuns() for descending. MEMORIZE both — filtering + sorting = the IPA hard question every time!'},

{n:14,date:'Apr 4',dw:'Sat',ph:2,topic:'OOP Master Day — Real IPA Previous Year Question!',
slots:[
[W,'7:00–7:15','YouTube: search "TCS IPA Java OOP hard coding solution" (15 min ONLY!)','Watch one solution video. Note the approach: write class → private fields → constructor → getters → setters → methods → test. This order is the key to doing it fast.'],
[C,'7:15–8:15','Write from memory: complete Player class — REAL previous year IPA question!','class Player{private int playerId; private String playerName; private int runs; private String playerType; private String matchType; + parameterized constructor + ALL 10 getters/setters + method getPlayerWithLowestRuns(ArrayList<Player>) + method filterByMatchTypeDescending(ArrayList<Player>,String)}. Full solution from scratch, no help!'],
[G,'8:15–8:45','GFG: practice.geeksforgeeks.org → Java → filter Medium OOP → do 2 problems','After Player class, practice 2 more OOP problems on GFG Medium level. This pushes you beyond IPA level — if you can do GFG Medium, IPA Hard becomes easy.'],
[P,'8:45–9:00','Share your Player class code here — I will score it out of 35 IPA marks!','I will check every detail: private fields? correct constructor? all getters/setters present? method logic correct? edge cases handled? I will give you an IPA score and tell you EXACTLY what to fix before exam.']
],tip:'This is the single most important practice day. Can you write the complete Player class + all methods from memory in under 20 minutes? If yes → 35/35 in IPA coding is yours. Test yourself!'},

// Phase 3: Topics + Practice
{n:15,date:'Apr 5',dw:'Sun',ph:3,topic:'Exception Handling + Math Class + String.format()',

const allDays=[...days,examDay];
let cp=1,cd=1;

function renderPhases(){
  const pn=[{id:1,l:'Phase 1 — Basics'},{id:2,l:'Phase 2 — OOP'},{id:3,l:'Phase 3 — Practice'},{id:4,l:'Phase 4 — Mock'},{id:5,l:'Exam Day ⭐'}];
  document.getElementById('ptabs').innerHTML=pn.map(p=>`<button class="pt${p.id===5?' et':''}${p.id===cp?' on':''}" onclick="sp(${p.id})">${p.l}</button>`).join('');
}

function renderDays(){
  const pd=allDays.filter(d=>d.ph===cp);
  document.getElementById('dchips').innerHTML=pd.map(d=>`<div class="dc${d.ph===5?' edc':''}${d.n===cd?' on':''}" onclick="sd(${d.n})"><span class="dcd">${d.date}</span><span class="dcn">Day ${d.n}</span></div>`).join('');
}

function renderDetail(){
  const d=allDays.find(x=>x.n===cd);
  if(!d)return;
  const slots=d.slots.map(([type,time,what,detail])=>`
    <div class="slot ${type}">
      <div class="sh"><span class="st">${time}</span><span class="stag">${TAGS[type]}</span><span class="sw2">${what}</span></div>
      <div class="sb">${detail}</div>
    </div>`).join('');
  const tipCls=d.n===23?'wrn':d.n===24?'suc':'tip';
  document.getElementById('dp').innerHTML=`
    <div class="dph">
      <div class="dpt">Day ${d.n} — ${d.topic}</div>
      <div class="dps">${d.date} (${d.dw||''})${d.n<24?' · 7:00–9:00 PM · 2 hours · Stick to schedule!':' · EXAM DAY'}</div>
    </div>
    <div class="dpb">${slots}<div class="${tipCls}">${d.tip}</div></div>`;
}

function sp(p){cp=p;const pd=allDays.filter(d=>d.ph===p);cd=pd[0].n;renderPhases();renderDays();renderDetail();}
function sd(n){cd=n;renderDays();renderDetail();}

renderPhases();renderDays();renderDetail();
</script>
